# deny.toml — cargo-deny configuration.
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

# ---------------------------------------------------------------------------
# Advisories — flag known-vulnerable, unmaintained, or yanked crates.
# ---------------------------------------------------------------------------
[advisories]
# Deny crates with known security vulnerabilities (RustSec advisories).
vulnerability = "deny"
# Warn on crates flagged as unmaintained (may upgrade to deny later).
unmaintained  = "warn"
# Deny yanked crate versions.
yanked        = "deny"
# Warn on crates with notices (informational).
notice        = "warn"

# ---------------------------------------------------------------------------
# Licenses — allow only permissive SPDX identifiers.
# ---------------------------------------------------------------------------
[licenses]
# Deny any crate whose license is not in this allow-list.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Zlib",
]
# Deny anything that triggers copyleft obligations.
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "LGPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
    "AGPL-3.0",
]
# Confidence threshold for fuzzy license matching.
confidence-threshold = 0.8

# ---------------------------------------------------------------------------
# Bans — duplicate crates and explicitly blocked crates.
# ---------------------------------------------------------------------------
[bans]
# Warn when multiple versions of the same crate are in the tree.
multiple-versions = "warn"
# Deny these crates outright (empty now; add as needed).
deny = []

# ---------------------------------------------------------------------------
# Sources — only allow crates from crates.io.
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
