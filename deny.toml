# deny.toml — cargo-deny 0.19 configuration (version 2 advisories schema).
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

# ---------------------------------------------------------------------------
# Advisories (version = 2 schema, cargo-deny >= 0.14)
#   - `vulnerability` and `notice` keys are REMOVED in v2.
#     Vulnerabilities are always denied; notices are always warned.
#   - `unmaintained` is now a SCOPE selector, not a severity.
#   - `yanked` still accepts "deny" | "warn" | "allow".
# ---------------------------------------------------------------------------
[advisories]
version      = 2
unmaintained = "workspace"   # "all" | "workspace" | "transitive" | "none"
yanked       = "deny"

# ---------------------------------------------------------------------------
# Licenses — allow only permissive SPDX identifiers.
# ---------------------------------------------------------------------------
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Zlib",
    "BSL-1.0",  # cobs crate (Boost Software License — permissive)
    "0BSD",     # various transitive deps (BSD Zero Clause)
]
# Any license NOT in the allow list above is implicitly denied.
# Copyleft (GPL/LGPL/AGPL) is not in the list, so it is denied automatically.
confidence-threshold = 0.8

# ---------------------------------------------------------------------------
# Bans — duplicate crates and explicitly blocked crates.
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"

# ---------------------------------------------------------------------------
# Sources — only allow crates from crates.io.
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]

